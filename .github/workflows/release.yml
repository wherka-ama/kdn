name: release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Release
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          version: "~> v2.14"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}

      - name: Install binst
        run: go install github.com/binary-install/binstaller/cmd/binst@e53d3e79dc475ac4049887dc30ff8df09fd1ea25

      - name: Generate install.sh
        run: |
          binst embed-checksums --config .config/binstaller.yml --mode calculate
          binst gen --config=.config/binstaller.yml -o install.sh

      - name: Upload install.sh to release
        run: gh release upload ${{ github.ref_name }} install.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload install.ps1 to release
        run: gh release upload ${{ github.ref_name }} install.ps1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bump-next-version:
    name: Bump Next Version
    runs-on: ubuntu-24.04
    needs: release
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'

      - name: Install svu
        run: go install github.com/caarlos0/svu/v3@9324add9d66418b2da930a03071dc285915c7a37 # v3.4.0

      - name: Compute next version
        id: version
        run: |
          NEXT_VERSION=$(svu minor | sed 's/^v//')
          echo "next_version=${NEXT_VERSION}-next" >> $GITHUB_OUTPUT

      - name: Checkout main branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Update version file
        run: |
          sed -i "s/var Version = \".*\"/var Version = \"${{ steps.version.outputs.next_version }}\"/" pkg/version/version.go

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create PR
        run: |
          BRANCH="bump-next-${{ steps.version.outputs.next_version }}"
          git checkout -b "$BRANCH"
          git add pkg/version/version.go
          git commit -m "chore: bump version to ${{ steps.version.outputs.next_version }}"
          git push origin "$BRANCH"
          pullRequestUrl=$(gh pr create \
            --title "chore: bump version to ${{ steps.version.outputs.next_version }}" \
            --body "Bump version to \`${{ steps.version.outputs.next_version }}\` after release \`${{ github.ref_name }}\`." \
            --base main \
            --head "$BRANCH")
          echo "📢 Pull request created: ${pullRequestUrl}"
          echo "➡️ Flag the PR as being ready for review"
          gh pr ready "${pullRequestUrl}"
          echo "🔅 Mark the PR as being ok to be merged automatically"
          gh pr merge "${pullRequestUrl}" --auto --rebase
        env:
          GH_TOKEN: ${{ secrets.KAIDEN_BOT_TOKEN }}
