name: next-build

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  next-build:
    name: Next Build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.KAIDEN_BOT_TOKEN }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'

      - name: Compute version
        id: version
        run: |
          BASE_VERSION=$(grep 'var Version' pkg/version/version.go | sed 's/.*"\(.*\)"/\1/')
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          DATE=$(date -u +%Y%m%d)
          VERSION="${BASE_VERSION}.${DATE}.${SHORT_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "githubTag=v$VERSION" >> ${GITHUB_OUTPUT}

      - name: Override GoReleaser config for prereleases
        run: |
          yq -i '.release.github.name = "kdn-prereleases"' .goreleaser.yaml
          yq -i '.release.prerelease = "auto"' .goreleaser.yaml
          yq -i '.changelog.disable = true' .goreleaser.yaml

      - name: Create tag and push to prereleases repo
        run: |
          git config --local user.name ${{ github.actor }}
          git config --local user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git add .goreleaser.yaml
          git commit -m "chore: tag ${{ steps.version.outputs.githubTag }}"
          echo "Tagging with ${{ steps.version.outputs.githubTag }}"
          git tag ${{ steps.version.outputs.githubTag }}
          git remote add prereleases https://x-access-token:${KAIDEN_BOT_TOKEN}@github.com/openkaiden/kdn-prereleases
          git push prereleases ${{ steps.version.outputs.githubTag }}
        env:
          KAIDEN_BOT_TOKEN: ${{ secrets.KAIDEN_BOT_TOKEN }}

      - name: checkout the tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: openkaiden/kdn-prereleases
          ref: ${{ steps.version.outputs.githubTag }}
          fetch-depth: 0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: "~> v2.14"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.KAIDEN_BOT_TOKEN }}
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
