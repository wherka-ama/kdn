version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/kdn
    binary: kdn
    ldflags:
      - -s -w
      - -X github.com/openkaiden/kdn/pkg/version.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: amd64

notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      sign:
        certificate: "{{.Env.MACOS_SIGN_P12}}"
        password: "{{.Env.MACOS_SIGN_PASSWORD}}"
      notarize:
        issuer_id: "{{.Env.MACOS_NOTARY_ISSUER_ID}}"
        key_id: "{{.Env.MACOS_NOTARY_KEY_ID}}"
        key: "{{.Env.MACOS_NOTARY_KEY}}"
        wait: true
        timeout: 20m

archives:
  - formats: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: zip

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

checksum:
  disable: true

release:
  github:
    owner: openkaiden
    name: kdn
  footer: |

    ---

    ## Install

    **Linux / macOS:**
    ```sh
    curl -sSfL https://github.com/openkaiden/kdn/releases/download/{{ .Tag }}/install.sh | sh
    ```

    **Windows (PowerShell):**
    ```powershell
    irm https://github.com/openkaiden/kdn/releases/download/{{ .Tag }}/install.ps1 | iex
    ```

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
