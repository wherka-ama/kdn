apiVersion: v1
kind: Pod
metadata:
  name: {{.Name}}
  labels:
    app: onecli
spec:
  # Never: we manage container start order ourselves (postgres before onecli) to
  # avoid migration race conditions. OnFailure/Always would restart onecli before
  # postgres is ready, causing repeated migration failures.
  restartPolicy: Never
  volumes:
    - name: approval-handler
      hostPath:
        path: {{.ApprovalHandlerDir}}
  containers:
    - name: postgres
      image: docker.io/library/postgres:18-alpine
      env:
        - name: POSTGRES_USER
          value: "onecli"
        - name: POSTGRES_PASSWORD
          value: "onecli"
        - name: POSTGRES_DB
          value: "onecli"
      readinessProbe:
        exec:
          command:
            - pg_isready
            - "-U"
            - onecli
        initialDelaySeconds: 15
        periodSeconds: 5
        timeoutSeconds: 3
        failureThreshold: 10

    - name: onecli
      image: ghcr.io/onecli/onecli:{{.OnecliVersion}}
      securityContext:
        runAsUser: 0
      env:
        - name: DATABASE_URL
          value: "postgresql://onecli:onecli@localhost:5432/onecli"
        - name: NEXTAUTH_SECRET
          value: ""
        - name: NEXT_PUBLIC_APP_URL
          value: "http://127.0.0.1:10254"
        - name: APP_URL
          value: "http://127.0.0.1:10254"
        - name: GATEWAY_BASE_URL
          value: "localhost:10255"
      ports:
        - containerPort: 10254
          hostPort: {{.OnecliWebPort}}
          hostIP: "127.0.0.1"

    - name: approval-handler
      image: registry.access.redhat.com/ubi9/nodejs-22-minimal
      command: ["sh", "-c", "cp /app/* . 2>/dev/null; npm install --omit=optional && npx tsx approval-handler.ts"]
      volumeMounts:
        - name: approval-handler
          mountPath: /app:Z

    - name: network-guard
      image: {{.WorkspaceImage}}
      securityContext:
        capabilities:
          add: ["NET_ADMIN"]
      command: ["sleep", "infinity"]{{if .Forwards}}
      ports:{{range .Forwards}}
        - containerPort: {{.Target}}
          hostPort: {{.Port}}
          hostIP: "{{.Bind}}"{{end}}{{end}}
